services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spectramind
      POSTGRES_USER: spectramind
      POSTGRES_PASSWORD: spectramind
    ports:
      - "5432:5432"
    volumes:
      - spectramind_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectramind -d spectramind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  spectramind_postgres:
